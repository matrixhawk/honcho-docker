name: Publish Honcho Image

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional upstream tag to build, for example v3.0.6"
        required: false
        type: string
      force:
        description: "Rebuild even if the GHCR tag already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: honcho-image-publish
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/matrixhawk/honcho
  UPSTREAM_REPO: https://github.com/plastic-labs/honcho.git

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve upstream tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: bash ./scripts/resolve_target_tag.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image already exists
        id: exists
        run: |
          if docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.resolve.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push image
        if: github.event.inputs.force == 'true' || steps.exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.resolve.outputs.git_context }}
          file: Dockerfile
          push: true
          tags: ${{ steps.resolve.outputs.docker_tags }}
          labels: |
            org.opencontainers.image.title=honcho
            org.opencontainers.image.description=Mirror image built from plastic-labs/honcho upstream tags
            org.opencontainers.image.source=https://github.com/plastic-labs/honcho
            org.opencontainers.image.url=https://github.com/plastic-labs/honcho
            org.opencontainers.image.version=${{ steps.resolve.outputs.tag }}

      - name: Write summary
        run: |
          {
            echo "## Honcho image publish"
            echo
            echo "- target tag: \`${{ steps.resolve.outputs.tag }}\`"
            echo "- latest upstream tag: \`${{ steps.resolve.outputs.latest_tag }}\`"
            echo "- image exists before build: \`${{ steps.exists.outputs.exists }}\`"
            echo "- force rebuild: \`${{ github.event.inputs.force || 'false' }}\`"
            echo "- published latest tag: \`${{ steps.resolve.outputs.publish_latest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
